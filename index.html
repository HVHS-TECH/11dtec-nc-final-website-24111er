            <!-- This is the code for the interactive image carousel. -->
            <h2>Classic Reads</h2>
            <div class="carousel"> 
                <div class="items">
                    <div class ="items-content">
                        <img class="carouselImages" src="Images/Narnia.jpg" alt="The Narnia Chronicles: The Lion, The Witch and The Wardrobe Book Cover" width="75%">
                        <div class="overlay">
                            <button class="icon" id="NarniaIcon"><img src="Images/info.png" alt="Information Icon"></button>
                        </div>
                    </div> 
                    
                    <div class="popup-content" id="NarniaPopup">
                        <div class="popup-titles">
                            <h3>The Chronicles of Narnia: The Lion, The Witch and The Wardrobe by C.S.Lewis</h3>
                        </div>
                        <div class="popupbutton">
                        <button id="NarniaClosebutton" class="close">&times;</button>
                        </div>
                        <div class="popup-images">
                            <img src="Images/Narnia.jpg" alt="The Chronicles of Narnia: The Lion, The Witch and The Wardrobe Book Cover" width="auto" height="80%">
                        </div>
                        <div class="maintext">
                            <p>Genre:</p>
                            <p>Others in the Series:</p>
                            <p>Overview:</p>
                        </div>
                    </div>
                    <!-- <p id="message"></p> This is something I use to test my javascript code to see if it works, this helps when I am trying to debug things-->
